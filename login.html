<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Comunidade do Amor</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="container">

    <div class="main-box">

    <!-- HERO -->
    <div class="hero">

      <!-- LOGO -->
      <div class="logo">
        <img src="logo.JPG" alt="Logo">
      </div>

      <h1>Comunidade do Amor</h1>

      <p class="subtitle">
        Uma jornada sagrada de amor próprio, transformação interior e reconexão espiritual.
      </p>

      <!-- CARDS -->
      <div class="info-cards">

        <div class="info-card">
          ✨
          <span>Rituais Sagrados</span>
        </div>

        <div class="info-card">
          ❤️
          <span>Amor Próprio</span>
        </div>

        <div class="info-card">
          🔮
          <span>Guia Espiritual</span>
        </div>

      </div>

    </div>

    <!-- LOGIN -->
    <div class="login-card">

      <form id="loginForm">

        <div class="input-group">
          <input type="email" id="email" placeholder="Digite seu email" required>
        </div>

        <div class="input-group hidden" id="passwordGroup">
          <input type="password" id="password" placeholder="Digite sua senha">
        </div>

        <p class="error-message" id="errorMessage"></p>

        <button type="submit" id="continueBtn">
          Continuar
        </button>

      </form>

    </div>
  </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
