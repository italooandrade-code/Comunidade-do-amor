<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Criar Senha</title>
  <link rel="stylesheet" href="create-password.css">
</head>

<body>

  <div class="container">

    <div class="login-card">

      <h1>Primeiro acesso</h1>
      <p class="subtitle">Crie sua senha para continuar</p>

      <form id="createPasswordForm">

        <!-- SENHA -->
        <div class="input-group">
          <input 
            type="password" 
            id="password" 
            placeholder="Crie sua senha"
            required
          >
        </div>

        <!-- CONFIRMAR SENHA -->
        <div class="input-group">
          <input 
            type="password" 
            id="confirmPassword" 
            placeholder="Confirme sua senha"
            required
          >
        </div>

        <!-- ERRO -->
        <p class="error-message" id="errorMessage"></p>

        <!-- BOTÃO -->
        <button type="submit">
          Criar senha
        </button>

      </form>

    </div>

  </div>
<script src="create-password.js"></script>
</body>
</html>
